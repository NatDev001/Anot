<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anot</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Anot</h1>

        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Pesquisar..."
            >
            <button>🔍</button>
        </div>

        <div class="icons">
            <span>👤</span>
            <span>⋮</span>
        </div>
    </header>

    <main id="foldersContainer"></main>

    <button id="addFolderBtn">+</button>

    <div id="folderModal" class="modal">

        <div class="modal-content">

            <h2>Novo Arquivo</h2>

            <input
                type="text"
                id="folderTitle"
                placeholder="Título do arquivo"
            >

            <div class="actions">
                <button id="cancelFolderBtn">
                    Cancelar
                </button>

                <button id="createFolderBtn">
                    Pronto
                </button>
            </div>

        </div>

    </div>

</body>
</html>
