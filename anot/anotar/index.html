<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Anotar</title>

<link rel="stylesheet" href="style.css">

<script src="script.js" defer></script>

</head>
<body>

<header>

    <button id="backBtn">
        ←
    </button>

    <h1>Anotar</h1>

    <button id="saveBtn">
        Salvar
    </button>

</header>

<main>

    <input
        type="text"
        id="noteTitle"
        placeholder="Título da anotação"
        autocomplete="off"
    >

    <div id="editor"></div>

</main>

</body>
</html>
